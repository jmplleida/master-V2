<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PintorApp · Consola Master</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#f0f0f8;min-height:100vh}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#12122a,#0a0a0f)}
.lbox{background:#1a1a26;border:1px solid #2a2a3a;border-radius:20px;padding:40px 32px;width:100%;max-width:360px;text-align:center}
.lbox .ico{font-size:44px;margin-bottom:10px}
.lbox h1{font-size:22px;font-weight:800;color:#f5c800;margin-bottom:4px}
.lbox p{font-size:12px;color:#555;margin-bottom:24px}
.lbox input{width:100%;padding:14px;background:#0a0a0f;border:2px solid #2a2a3a;border-radius:10px;color:#f0f0f8;font-size:20px;text-align:center;letter-spacing:4px;font-family:'DM Sans',sans-serif}
.lbox input:focus{outline:none;border-color:#f5c800}
.btn-y{width:100%;padding:14px;margin-top:14px;background:#f5c800;color:#0a0a0f;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif}
#lerr{color:#ff4444;font-size:13px;margin-top:10px;display:none}
#main{display:none}
.topbar{background:#12121a;border-bottom:1px solid #2a2a3a;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tlogo{font-weight:800;font-size:15px;color:#f5c800}
.tlogo span{color:#444;font-size:11px;font-weight:400;margin-left:6px}
.btn-out{background:transparent;border:1px solid #333;color:#777;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
.tabs{display:flex;gap:4px;padding:16px 16px 0}
.tab{flex:1;padding:10px;background:#1a1a26;border:1px solid #2a2a3a;border-radius:10px;color:#666;font-size:13px;font-weight:700;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif}
.tab.on{background:#2563eb;border-color:#2563eb;color:white}
.wrap{padding:16px;max-width:720px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px}
.sec-hdr h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#444}
.btn-add{background:#f5c800;color:#0a0a0f;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#1a1a26;border:1px solid #2a2a3a;border-radius:12px;padding:10px 14px;min-width:90px}
.stat .n{font-size:24px;font-weight:800;line-height:1}
.stat .l{font-size:10px;color:#444;text-transform:uppercase;margin-top:2px}
.cg{color:#00e676}.cr{color:#ff4444}.cy{color:#f5c800}.cb{color:#4fc3f7}
.card{background:#1a1a26;border:1px solid #2a2a3a;border-radius:14px;padding:14px;margin-bottom:10px}
.card.act{border-left:3px solid #00e676}
.card.ina{border-left:3px solid #ff4444;opacity:.75}
.card.exp{border-left:3px solid #f5c800}
.ctop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:white;flex-shrink:0}
.cname{font-weight:700;font-size:14px}
.csub{font-size:11px;color:#555}
.bdg{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.bdg.on{background:rgba(0,230,118,.15);color:#00e676}
.bdg.off{background:rgba(255,68,68,.15);color:#ff4444}
.bdg.ex{background:rgba(245,200,0,.15);color:#f5c800}
.cmeta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:#555}
.cmeta b{color:#aaa}
.cbar{height:4px;background:#2a2a3a;border-radius:2px;margin-bottom:8px;overflow:hidden}
.cbar-fill{height:100%;border-radius:2px}
.cmsg{background:#0a0a1f;border-left:2px solid #4fc3f7;border-radius:6px;padding:7px 10px;font-size:12px;color:#4fc3f7;margin-bottom:8px}
.cacts{display:flex;gap:6px;flex-wrap:wrap}
.cbtn{padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.cbtn.b1{background:rgba(0,230,118,.15);color:#00e676}
.cbtn.b2{background:rgba(255,68,68,.15);color:#ff4444}
.cbtn.b3{background:rgba(79,195,247,.15);color:#4fc3f7}
.cbtn.b4{background:#1e1e2e;color:#888}
.cbtn.b5{background:rgba(255,68,68,.08);color:#ff4444}
.pcard{background:#1a1a26;border:1px solid #2a2a3a;border-radius:14px;padding:14px;margin-bottom:10px}
.phdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pbdg{background:#f5c800;color:#0a0a0f;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:800}
.codes{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.chip{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;font-family:monospace}
.chip.libre{background:#1e2e1e;color:#00e676;border:1px solid #1a4a1a}
.chip.usado{background:#2e1e1e;color:#ff4444;border:1px solid #4a1a1a}
.pbar{height:4px;background:#2a2a3a;border-radius:2px;margin:6px 0;overflow:hidden}
.pbar-f{height:100%;border-radius:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.overlay.open{display:flex}
.modal{background:#1a1a26;border:1px solid #2a2a3a;border-radius:18px;padding:26px 22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:800;margin-bottom:18px}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#555;margin-bottom:5px}
.mf input,.mf select,.mf textarea{width:100%;padding:10px 12px;background:#0a0a0f;border:1.5px solid #2a2a3a;border-radius:8px;color:#f0f0f8;font-size:14px;font-family:'DM Sans',sans-serif}
.mf input:focus,.mf select:focus,.mf textarea:focus{outline:none;border-color:#f5c800}
.mf textarea{min-height:64px;resize:none}
.mbtns{display:flex;gap:8px;margin-top:18px}
.bsave{flex:2;padding:12px;background:#f5c800;color:#0a0a0f;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif}
.bcancel{flex:1;padding:12px;background:#1e1e2e;color:#888;border:1px solid #2a2a3a;border-radius:10px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a26;border:1px solid #2a2a3a;color:#f0f0f8;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="toast"></div>

<div id="login">
  <div class="lbox">
    <div class="ico">🎛</div>
    <h1>CONSOLA MASTER</h1>
    <p>PintorApp · Panel de control</p>
    <input type="password" id="clave" placeholder="••••••" maxlength="20">
    <button class="btn-y" id="btn-entrar">ENTRAR →</button>
    <div id="lerr">❌ Clave incorrecta</div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <div class="tlogo">🎛 CONSOLA MASTER <span>PintorApp</span></div>
    <button class="btn-out" id="btn-salir">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab1">🎨 Pintores</button>
    <button class="tab" id="tab2">🎟 Packs</button>
  </div>
  <div class="wrap" id="view1">
    <div class="stats" id="stats1"></div>
    <div class="sec-hdr">
      <h2>📋 Pintores registrados</h2>
      <button class="btn-add" id="btn-np">＋ Nuevo pintor</button>
    </div>
    <div id="grid1"><div style="text-align:center;color:#444;padding:40px">Conectando...</div></div>
  </div>
  <div class="wrap" id="view2" style="display:none">
    <div class="stats" id="stats2"></div>
    <div class="sec-hdr">
      <h2>🎟 Packs de licencias</h2>
      <button class="btn-add" id="btn-pk">＋ Nuevo pack</button>
    </div>
    <div id="grid2"><div style="text-align:center;color:#444;padding:40px">Sin packs</div></div>
  </div>
</div>

<div class="overlay" id="m-pintor">
  <div class="modal">
    <h3 id="m-pintor-t" style="color:#f5c800">➕ Nuevo pintor</h3>
    <div class="mf"><label>Nombre *</label><input type="text" id="f-nom" placeholder="Joan Pintors..."></div>
    <div class="mf"><label>Teléfono</label><input type="tel" id="f-tel" placeholder="612 345 678"></div>
    <div class="mf"><label>Población</label><input type="text" id="f-pob" placeholder="Lleida..."></div>
    <div class="mf"><label>Especialidad</label>
      <select id="f-esp">
        <option>Pintura interior i exterior</option><option>Pintura industrial</option>
        <option>Decoració i pintura</option><option>Impermeabilitzacions</option>
        <option>Pintura i reformes</option><option>Pintor autònom</option>
      </select>
    </div>
    <div class="mf"><label>Color</label>
      <select id="f-color">
        <option value="#2563eb">🔵 Azul</option><option value="#7c3aed">🟣 Morado</option>
        <option value="#059669">🟢 Verde</option><option value="#dc2626">🔴 Rojo</option>
        <option value="#d97706">🟡 Naranja</option><option value="#0891b2">🩵 Cyan</option>
        <option value="#1e293b">⚫ Negro</option>
      </select>
    </div>
    <div class="mf"><label>Caducidad</label>
      <select id="f-cad">
        <option value="3">3 meses</option><option value="6">6 meses</option>
        <option value="12" selected>12 meses (1 año)</option><option value="24">24 meses</option>
        <option value="0">Sin límite</option>
      </select>
    </div>
    <div class="mf"><label>Mensaje</label><textarea id="f-msg" placeholder="Bienvenido..."></textarea></div>
    <div class="mbtns">
      <button class="bcancel" id="f-cancel">Cancelar</button>
      <button class="bsave" id="f-save">💾 Guardar</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-msg">
  <div class="modal">
    <h3 style="color:#4fc3f7">💬 Mensaje al pintor</h3>
    <div class="mf"><label>Pintor</label><input type="text" id="msg-n" disabled style="opacity:.5"></div>
    <div class="mf"><label>Mensaje</label><textarea id="msg-t" placeholder="Escribe un aviso..."></textarea></div>
    <div class="mbtns">
      <button class="bcancel" id="msg-cancel">Cancelar</button>
      <button class="bsave" id="msg-save" style="background:#4fc3f7;color:#0a0a0f">📤 Enviar</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-pack">
  <div class="modal">
    <h3 style="color:#f5c800">🎟 Nuevo pack</h3>
    <div class="mf"><label>Cliente *</label><input type="text" id="pk-cli" placeholder="La Botiga del Robert..."></div>
    <div class="mf"><label>Teléfono</label><input type="tel" id="pk-tel" placeholder="973 000 392"></div>
    <div class="mf"><label>Licencias</label>
      <select id="pk-num"><option value="10">10</option><option value="20">20</option><option value="30">30</option></select>
    </div>
    <div class="mf"><label>Duración</label>
      <select id="pk-dur"><option value="12" selected>12 meses</option><option value="6">6 meses</option><option value="24">24 meses</option></select>
    </div>
    <div class="mbtns">
      <button class="bcancel" id="pk-cancel">Cancelar</button>
      <button class="bsave" id="pk-save">🎟 Generar</button>
    </div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBsnQ3pRx0AS0n3AEr0jp8atCbVlQIuyYQ",
  authDomain:"pintorapp-6d480.firebaseapp.com",
  databaseURL:"https://pintorapp-6d480-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"pintorapp-6d480",
  storageBucket:"pintorapp-6d480.firebasestorage.app",
  messagingSenderId:"798799179968",
  appId:"1:798799179968:web:14ab31b03e17b8b041bd25"
});
var db=firebase.database();
var CLAVE='NachiDacia2342';
var WA='34609321585';
var pintores={};var packs={};var editId=null;var msgId=null;

// LOGIN
document.getElementById('btn-entrar').onclick=function(){
  var v=document.getElementById('clave').value.trim();
  if(v===CLAVE){
    document.getElementById('login').style.display='none';
    document.getElementById('main').style.display='block';
    start();
  }else{
    document.getElementById('lerr').style.display='block';
    document.getElementById('clave').value='';
  }
};
document.getElementById('clave').onkeydown=function(e){if(e.key==='Enter')document.getElementById('btn-entrar').click();};
document.getElementById('btn-salir').onclick=function(){
  document.getElementById('main').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('clave').value='';
};

// TABS
document.getElementById('tab1').onclick=function(){
  document.getElementById('view1').style.display='block';
  document.getElementById('view2').style.display='none';
  document.getElementById('tab1').className='tab on';
  document.getElementById('tab2').className='tab';
};
document.getElementById('tab2').onclick=function(){
  document.getElementById('view1').style.display='none';
  document.getElementById('view2').style.display='block';
  document.getElementById('tab1').className='tab';
  document.getElementById('tab2').className='tab on';
  renderPacks();
};

// FIREBASE
function start(){
  db.ref('pintorapp/pintores').on('value',function(s){pintores=s.val()||{};renderPintores();});
  db.ref('pintorapp/packs').on('value',function(s){packs=s.val()||{};});
}

function status(p){
  if(!p.activo)return'ina';
  if(p.caducidad_meses>0&&p.created_at){
    var e=new Date(p.created_at);e.setMonth(e.getMonth()+parseInt(p.caducidad_meses));
    if(new Date()>e)return'exp';
  }
  return'act';
}

function renderPintores(){
  var ks=Object.keys(pintores);
  var a=ks.filter(function(k){return status(pintores[k])==='act';}).length;
  var i=ks.filter(function(k){return status(pintores[k])==='ina';}).length;
  var e=ks.filter(function(k){return status(pintores[k])==='exp';}).length;
  document.getElementById('stats1').innerHTML=
    s(ks.length,'Total','cy')+s(a,'Activos','cg')+s(i,'Inactivos','cr')+s(e,'Caducados','cb');
  var g=document.getElementById('grid1');
  if(!ks.length){g.innerHTML='<div style="text-align:center;color:#444;padding:40px">Sin pintores. Pulsa "+ Nuevo pintor"</div>';return;}
  g.innerHTML='';
  ks.forEach(function(id){
    var p=pintores[id];var st=status(p);
    var ini=(p.nom||'?').split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
    var stl=st==='act'?'ACTIVO':st==='exp'?'CADUCADO':'INACTIVO';
    var stc=st==='act'?'on':st==='exp'?'ex':'off';
    var bar='';
    if(p.caducidad_meses>0&&p.created_at){
      var cr=new Date(p.created_at);var ex=new Date(cr);ex.setMonth(ex.getMonth()+parseInt(p.caducidad_meses));
      var pct=Math.min(100,Math.max(0,((new Date()-cr)/(ex-cr))*100));
      var bc=pct>80?'#ff4444':pct>50?'#f5c800':'#00e676';
      var days=Math.max(0,Math.ceil((ex-new Date())/864e5));
      bar='<div class="cbar"><div class="cbar-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>'+
          '<div style="font-size:10px;color:#444;margin-bottom:6px">'+(days>0?days+' días restantes':'CADUCADO')+'</div>';
    }
    var tog=st==='act'?
      '<button class="cbtn b2" data-act="tog" data-id="'+id+'">⏸ Desactivar</button>':
      '<button class="cbtn b1" data-act="tog" data-id="'+id+'">▶ Activar</button>';
    var div=document.createElement('div');
    div.className='card '+st;
    div.innerHTML=
      '<div class="ctop">'+
        '<div class="av" style="background:'+(p.color||'#2563eb')+'">'+ini+'</div>'+
        '<div style="flex:1"><div class="cname">'+(p.nom||'Sin nombre')+'</div>'+
        '<div class="csub">'+(p.esp||'Pintor')+' · '+(p.pob||'—')+'</div></div>'+
        '<div class="bdg '+stc+'">'+stl+'</div>'+
      '</div>'+
      '<div class="cmeta"><span>📞 <b>'+(p.tel||'—')+'</b></span>'+
      '<span>📅 <b>'+(p.created_at?new Date(p.created_at).toLocaleDateString('es-ES'):'—')+'</b></span>'+
      '<span>⏱ <b>'+(p.caducidad_meses>0?p.caducidad_meses+'m':'∞')+'</b></span></div>'+
      bar+(p.mensaje?'<div class="cmsg">💬 '+p.mensaje+'</div>':'')+
      '<div class="cacts">'+tog+
        '<button class="cbtn b3" data-act="msg" data-id="'+id+'">💬 Mensaje</button>'+
        '<button class="cbtn b4" data-act="edi" data-id="'+id+'">✏️ Editar</button>'+
        '<button class="cbtn b5" data-act="del" data-id="'+id+'">🗑</button>'+
      '</div>';
    g.appendChild(div);
  });
  g.querySelectorAll('[data-act]').forEach(function(b){
    b.onclick=function(){
      var id=this.getAttribute('data-id');
      var act=this.getAttribute('data-act');
      if(act==='tog'){db.ref('pintorapp/pintores/'+id).update({activo:!pintores[id].activo});toast((pintores[id].activo?'⏸ Desactivado':'✅ Activado'));}
      else if(act==='msg'){msgId=id;document.getElementById('msg-n').value=pintores[id].nom||'';document.getElementById('msg-t').value=pintores[id].mensaje||'';document.getElementById('m-msg').classList.add('open');}
      else if(act==='edi'){
        editId=id;var p=pintores[id];
        document.getElementById('m-pintor-t').textContent='✏️ Editar pintor';
        document.getElementById('f-nom').value=p.nom||'';document.getElementById('f-tel').value=p.tel||'';
        document.getElementById('f-pob').value=p.pob||'';document.getElementById('f-esp').value=p.esp||'Pintura interior i exterior';
        document.getElementById('f-color').value=p.color||'#2563eb';document.getElementById('f-cad').value=p.caducidad_meses||12;
        document.getElementById('f-msg').value=p.mensaje||'';document.getElementById('m-pintor').classList.add('open');
      }
      else if(act==='del'){if(confirm('¿Eliminar a '+pintores[id].nom+'?')){db.ref('pintorapp/pintores/'+id).remove();toast('🗑 Eliminado');}}
    };
  });
}

function s(n,l,c){return'<div class="stat"><div class="n '+c+'">'+n+'</div><div class="l">'+l+'</div></div>';}

// NUEVO PINTOR
document.getElementById('btn-np').onclick=function(){
  editId=null;document.getElementById('m-pintor-t').textContent='➕ Nuevo pintor';
  ['f-nom','f-tel','f-pob','f-msg'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('m-pintor').classList.add('open');
};
document.getElementById('f-cancel').onclick=function(){document.getElementById('m-pintor').classList.remove('open');};
document.getElementById('f-save').onclick=function(){
  var nom=document.getElementById('f-nom').value.trim();
  if(!nom){toast('⚠️ Escribe el nombre');return;}
  var id=editId||'pintor_'+Date.now();
  var ex=(editId&&pintores[editId])||{};
  db.ref('pintorapp/pintores/'+id).set({
    nom:nom,tel:document.getElementById('f-tel').value.trim(),
    pob:document.getElementById('f-pob').value.trim(),
    esp:document.getElementById('f-esp').value,
    color:document.getElementById('f-color').value,
    caducidad_meses:parseInt(document.getElementById('f-cad').value),
    mensaje:document.getElementById('f-msg').value.trim(),
    activo:ex.activo!==undefined?ex.activo:true,
    created_at:ex.created_at||new Date().toISOString(),
    num_presupuestos:ex.num_presupuestos||0
  });
  document.getElementById('m-pintor').classList.remove('open');
  toast(editId?'✅ Actualizado':'✅ Pintor añadido');
};

// MENSAJE
document.getElementById('msg-cancel').onclick=function(){document.getElementById('m-msg').classList.remove('open');};
document.getElementById('msg-save').onclick=function(){
  db.ref('pintorapp/pintores/'+msgId).update({mensaje:document.getElementById('msg-t').value.trim()});
  document.getElementById('m-msg').classList.remove('open');toast('💬 Mensaje enviado');
};

// PACKS
document.getElementById('btn-pk').onclick=function(){
  document.getElementById('pk-cli').value='';document.getElementById('pk-tel').value='';
  document.getElementById('m-pack').classList.add('open');
};
document.getElementById('pk-cancel').onclick=function(){document.getElementById('m-pack').classList.remove('open');};
document.getElementById('pk-save').onclick=function(){
  var cli=document.getElementById('pk-cli').value.trim();
  if(!cli){toast('⚠️ Escribe el cliente');return;}
  var num=parseInt(document.getElementById('pk-num').value);
  var dur=parseInt(document.getElementById('pk-dur').value);
  var codes={};
  for(var i=0;i<num;i++){var c=genCode();codes[c]={estado:'libre',creado:new Date().toISOString(),duracion_meses:dur};}
  db.ref('pintorapp/packs/pack_'+Date.now()).set({
    cliente:cli,tel:document.getElementById('pk-tel').value.trim(),
    num_total:num,duracion_meses:dur,creado:new Date().toISOString(),codigos:codes
  });
  document.getElementById('m-pack').classList.remove('open');
  toast('✅ Pack con '+num+' códigos generado');
  document.getElementById('tab2').click();
};

function genCode(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';
  for(var i=0;i<10;i++){if(i===4||i===8)r+='-';r+=c[Math.floor(Math.random()*c.length)];}
  return r;
}

function renderPacks(){
  var ks=Object.keys(packs);
  var tl=0,lib=0,us=0;
  ks.forEach(function(k){var cs=packs[k].codigos||{};Object.values(cs).forEach(function(c){tl++;if(c.estado==='libre')lib++;else us++;});});
  document.getElementById('stats2').innerHTML=s(ks.length,'Packs','cy')+s(lib,'Libres','cg')+s(us,'Usados','cr');
  var g=document.getElementById('grid2');
  if(!ks.length){g.innerHTML='<div style="text-align:center;color:#444;padding:40px">Sin packs. Pulsa "+ Nuevo pack"</div>';return;}
  g.innerHTML='';
  ks.forEach(function(pid){
    var pk=packs[pid];var cs=pk.codigos||{};var cks=Object.keys(cs);
    var libres=cks.filter(function(k){return cs[k].estado==='libre';});
    var pct=Math.round((cks.length-libres.length)/Math.max(cks.length,1)*100);
    var bc=pct>=90?'#ff4444':pct>=60?'#f5c800':'#00e676';
    var codesHtml=cks.map(function(c){return'<span class="chip '+(cs[c].estado==='libre'?'libre':'usado')+'">'+c+'</span>';}).join('');
    var div=document.createElement('div');div.className='pcard';
    div.innerHTML=
      '<div class="phdr"><div class="pbdg">🎟</div><div style="flex:1;font-weight:700">'+pk.cliente+'</div>'+
      (pk.tel?'<div style="font-size:11px;color:#444">'+pk.tel+'</div>':'')+
      '</div>'+
      '<div style="font-size:11px;color:#555;margin-bottom:4px">'+libres.length+' libres / '+cks.length+' total · '+pk.duracion_meses+' meses</div>'+
      '<div class="pbar"><div class="pbar-f" style="width:'+pct+'%;background:'+bc+'"></div></div>'+
      '<div class="codes">'+codesHtml+'</div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">'+
        '<button class="cbtn b3" data-pac="'+pid+'" data-act="copy">📋 Copiar libres</button>'+
        '<button class="cbtn b1" data-pac="'+pid+'" data-act="wa">📱 WhatsApp</button>'+
        '<button class="cbtn b5" data-pac="'+pid+'" data-act="del">🗑 Eliminar</button>'+
      '</div>';
    g.appendChild(div);
  });
  g.querySelectorAll('[data-pac]').forEach(function(b){
    b.onclick=function(){
      var pid=this.getAttribute('data-pac');var act=this.getAttribute('data-act');
      var pk=packs[pid];var cs=pk.codigos||{};
      var lib=Object.keys(cs).filter(function(k){return cs[k].estado==='libre';});
      if(act==='copy'){
        if(!lib.length){toast('⚠️ Sin libres');return;}
        var txt='🎟 CÓDIGOS PINTORAPP — '+pk.cliente+'\n'+'━'.repeat(20)+'\n';
        lib.forEach(function(c,i){txt+=(i+1)+'. '+c+'\n';});
        txt+='━'.repeat(20)+'\nVálidos '+pk.duracion_meses+' meses · wa.me/'+WA;
        navigator.clipboard.writeText(txt).then(function(){toast('📋 '+lib.length+' códigos copiados');});
      }else if(act==='wa'){
        if(!lib.length){toast('⚠️ Sin libres');return;}
        var msg='🎨 *PINTORAPP*\n🏪 *'+pk.cliente+'*\n🎟 '+lib.length+' llicències · '+pk.duracion_meses+' mesos\n\n';
        lib.forEach(function(c,i){msg+=(i+1)+'. '+c+'\n';});
        msg+='\n❓ wa.me/'+WA;
        var tel=pk.tel?(pk.tel.replace(/\D/g,''):''):'';
        window.open('https://wa.me/'+(tel?'34'+tel:'')+'?text='+encodeURIComponent(msg),'_blank');
      }else if(act==='del'){
        if(confirm('¿Eliminar pack de '+pk.cliente+'?')){db.ref('pintorapp/packs/'+pid).remove();toast('🗑 Eliminado');renderPacks();}
      }
    };
  });
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2800);
}
</script>
</body>
</html>
